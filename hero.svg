<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#080c18"/><stop offset="1" stop-color="#0b1122"/>
    </linearGradient>
    <linearGradient id="openrib" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1c6f63"/><stop offset="1" stop-color="#34e5c4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg)"/>

  <text x="60" y="66" fill="#e8eefc" font-size="34" font-weight="800"><tspan fill="#34e5c4">gated</tspan>-selfimprovement</text>
  <text x="62" y="94" fill="#8ea2c8" font-size="14.5">Certified novel behaviours over 4,444 generations — measured, LLM-free, counterfactually controlled.</text>

  <polygon points="250,380 827,380 977,310 400,310" fill="#0e1730" stroke="#1b2848" stroke-width="1"/>
  <g stroke="#17223c" stroke-width="1">
    <line x1="250" y1="380" x2="400" y2="310"/>
    <line x1="394" y1="380" x2="544" y2="310"/>
    <line x1="538" y1="380" x2="688" y2="310"/>
    <line x1="682" y1="380" x2="832" y2="310"/>
    <line x1="827" y1="380" x2="977" y2="310"/>
  </g>
  <g stroke="#141d34" stroke-width="1">
    <line x1="250" y1="315" x2="827" y2="315"/>
    <line x1="250" y1="250" x2="827" y2="250"/>
    <line x1="250" y1="185" x2="827" y2="185"/>
    <line x1="250" y1="120" x2="827" y2="120"/>
  </g>
  <line x1="250" y1="380" x2="250" y2="108" stroke="#2a3a5c" stroke-width="1.5"/>
  <g fill="#6c7ea6" font-size="11" text-anchor="end">
    <text x="242" y="384">0</text>
    <text x="242" y="319">50</text>
    <text x="242" y="254">100</text>
    <text x="242" y="189">150</text>
    <text x="242" y="124">200</text>
  </g>
  <text x="130" y="240" fill="#8ea2c8" font-size="12" transform="rotate(-90 130 240)">certified novel behaviours</text>
  <line x1="250" y1="380" x2="827" y2="380" stroke="#2a3a5c" stroke-width="1.5"/>
  <g fill="#6c7ea6" font-size="11" text-anchor="middle">
    <text x="250" y="400">0</text>
    <text x="394" y="400">1000</text>
    <text x="538" y="400">2000</text>
    <text x="682" y="400">3000</text>
    <text x="827" y="400">4444 gen</text>
  </g>

  <polyline points="400,310 544,310 688,310 832,310"
    fill="none" stroke="#4a577a" stroke-width="3" stroke-linejoin="round" opacity="0.9"
    stroke-dasharray="600" stroke-dashoffset="600">
    <animate attributeName="stroke-dashoffset" from="600" to="0" dur="2.2s" fill="freeze"/>
  </polyline>
  <text x="905" y="314" fill="#8ea2c8" font-size="13" font-weight="700" opacity="0">
    CLOSED · 0
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.5s" fill="freeze"/>
  </text>

  <polygon points="250,380 282,380 315,371 380,275 510,235 660,198 770,161 827,134 827,380"
    fill="#34e5c4" opacity="0.10"/>
  <polyline points="250,380 282,380 315,371 380,275 510,235 660,198 770,161 827,134"
    fill="none" stroke="url(#openrib)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"
    stroke-dasharray="900" stroke-dashoffset="900">
    <animate attributeName="stroke-dashoffset" from="900" to="0" begin="0.4s" dur="2.6s" fill="freeze"/>
  </polyline>
  <g fill="#7ffbe6">
    <circle cx="315" cy="371" r="0"><animate attributeName="r" values="0;4" begin="0.9s" dur="0.3s" fill="freeze"/></circle>
    <circle cx="380" cy="275" r="0"><animate attributeName="r" values="0;4" begin="1.3s" dur="0.3s" fill="freeze"/></circle>
    <circle cx="510" cy="235" r="0"><animate attributeName="r" values="0;4" begin="1.7s" dur="0.3s" fill="freeze"/></circle>
    <circle cx="660" cy="198" r="0"><animate attributeName="r" values="0;4" begin="2.1s" dur="0.3s" fill="freeze"/></circle>
    <circle cx="770" cy="161" r="0"><animate attributeName="r" values="0;4" begin="2.5s" dur="0.3s" fill="freeze"/></circle>
    <circle cx="827" cy="134" r="0"><animate attributeName="r" values="0;5.5" begin="2.9s" dur="0.35s" fill="freeze"/></circle>
  </g>
  <text x="843" y="130" fill="#34e5c4" font-size="15" font-weight="800" opacity="0">
    OPEN · 189
    <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.5s" fill="freeze"/>
  </text>

  <text x="250" y="440" fill="#9fb0d4" font-size="13">
    Same loop, same budget. <tspan fill="#34e5c4" font-weight="700">OPEN</tspan> admits self-discovered building blocks through a counterfactual gate;
  </text>
  <text x="250" y="459" fill="#9fb0d4" font-size="13">
    <tspan fill="#8ea2c8" font-weight="700">CLOSED</tspan> (admission disabled) provably cannot leave the base system — and never does.
  </text>

  <g font-size="12.5" font-weight="600" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.3s" dur="0.6s" fill="freeze"/>
    <g transform="translate(1000,150)">
      <rect x="-4" y="-20" width="184" height="28" rx="14" fill="#0e1a2c" stroke="#34e5c4" stroke-opacity="0.4"/>
      <text x="12" y="0" fill="#cfe8e2">transfer +2.00 · p=8e-4</text>
    </g>
    <g transform="translate(1000,190)">
      <rect x="-4" y="-20" width="184" height="28" rx="14" fill="#0e1a2c" stroke="#34e5c4" stroke-opacity="0.4"/>
      <text x="12" y="0" fill="#cfe8e2">MetaForge +21% vs frozen</text>
    </g>
    <g transform="translate(1000,230)">
      <rect x="-4" y="-20" width="184" height="28" rx="14" fill="#0e1a2c" stroke="#7ad9ff" stroke-opacity="0.4"/>
      <text x="12" y="0" fill="#cfe8e2">compounding p&lt;1e-4 · n=100</text>
    </g>
  </g>
</svg>
