<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b16"/><stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffcf5a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffcf5a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gt" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#12463f"/><stop offset="1" stop-color="#34e5c4"/>
    </linearGradient>
    <linearGradient id="fz" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1a2136"/><stop offset="1" stop-color="#4a577a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="460" fill="url(#bg)"/>
  <g stroke="#16203a" stroke-width="1" opacity="0.7">
    <line x1="0" y1="380" x2="1200" y2="380"/><line x1="0" y1="405" x2="1200" y2="405"/>
    <line x1="0" y1="432" x2="1200" y2="432"/>
    <line x1="250" y1="370" x2="120" y2="460"/><line x1="470" y1="370" x2="430" y2="460"/>
    <line x1="730" y1="370" x2="770" y2="460"/><line x1="950" y1="370" x2="1080" y2="460"/>
  </g>

  <!-- FROZEN tower: flat, dim, static -->
  <g transform="translate(880,40)">
    <rect x="-45" y="300" width="90" height="40" rx="4" fill="url(#fz)" opacity="0.9"/>
    <rect x="-45" y="258" width="90" height="40" rx="4" fill="url(#fz)" opacity="0.85"/>
    <text x="0" y="372" fill="#8ea2c8" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="1">FROZEN</text>
    <text x="0" y="244" fill="#5a6785" font-size="12" text-anchor="middle">admission off · flat</text>
  </g>

  <!-- GATED tower: blocks grow in one by one, then glow-pulse -->
  <g transform="translate(300,40)">
    <g>
      <rect x="-45" y="300" width="90" height="40" rx="4" fill="url(#gt)">
        <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.08;1" dur="9s" repeatCount="indefinite"/>
      </rect>
      <rect x="-45" y="258" width="90" height="40" rx="4" fill="url(#gt)">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.12;0.2;1" dur="9s" repeatCount="indefinite"/>
      </rect>
      <rect x="-45" y="216" width="90" height="40" rx="4" fill="url(#gt)">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.24;0.32;1" dur="9s" repeatCount="indefinite"/>
      </rect>
      <rect x="-45" y="174" width="90" height="40" rx="4" fill="url(#gt)">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.36;0.44;1" dur="9s" repeatCount="indefinite"/>
      </rect>
      <rect x="-45" y="132" width="90" height="40" rx="4" fill="url(#gt)">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.48;0.56;1" dur="9s" repeatCount="indefinite"/>
      </rect>
      <rect x="-45" y="90" width="90" height="40" rx="4" fill="url(#gt)">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.6;0.68;1" dur="9s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="0" y="372" fill="#34e5c4" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="1">GATED</text>
    <text x="0" y="76" fill="#8ff0dd" font-size="12" text-anchor="middle" opacity="0">
      admits self-found blocks
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.68;0.76;1" dur="9s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- THE GATE: pseudo-3D spinning torus + pulsing glow -->
  <g transform="translate(595,235)">
    <ellipse cx="0" cy="0" rx="130" ry="130" fill="url(#glow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <g>
      <ellipse cx="0" cy="0" rx="70" ry="30" fill="none" stroke="#ffcf5a" stroke-width="7" opacity="0.95">
        <animate attributeName="rx" values="70;18;70" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="70" ry="30" fill="none" stroke="#fff3cf" stroke-width="2" opacity="0.7">
        <animate attributeName="rx" values="70;18;70" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      </ellipse>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite"/>
    </g>
    <text x="0" y="72" fill="#ffcf5a" font-size="12.5" font-weight="600" text-anchor="middle">THE GATE — counterfactual test</text>

    <g fill="#9ff5e4">
      <circle cx="-18" r="2.4"><animate attributeName="cy" values="120;-150" dur="3.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.95;0" dur="3.2s" repeatCount="indefinite"/></circle>
      <circle cx="12" r="2"><animate attributeName="cy" values="120;-150" dur="2.7s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.85;0" dur="2.7s" begin="0.5s" repeatCount="indefinite"/></circle>
      <circle cx="-30" r="1.8"><animate attributeName="cy" values="120;-150" dur="3.8s" begin="1.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.75;0" dur="3.8s" begin="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="28" r="1.7"><animate attributeName="cy" values="120;-150" dur="3s" begin="1.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0" dur="3s" begin="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="0" r="2.2"><animate attributeName="cy" values="120;-150" dur="2.4s" begin="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.9;0" dur="2.4s" begin="2s" repeatCount="indefinite"/></circle>
      <circle cx="-8" r="1.5"><animate attributeName="cy" values="120;-150" dur="3.5s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="3.5s" begin="0.9s" repeatCount="indefinite"/></circle>
      <circle cx="20" r="1.5"><animate attributeName="cy" values="120;-150" dur="4s" begin="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="4s" begin="2.4s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <text x="60" y="72" fill="#e8eefc" font-size="38" font-weight="800" letter-spacing="0.5"><tspan fill="#34e5c4">gated</tspan>-selfimprovement</text>
  <text x="62" y="102" fill="#8ea2c8" font-size="15.5">Recursive self-improvement, measured with counterfactual controls. LLM-free · pure-Python · deterministic.</text>

  <g font-size="13" font-weight="600">
    <g transform="translate(62,132)" opacity="0">
      <rect width="196" height="30" rx="15" fill="#0e1a2c" stroke="#34e5c4" stroke-opacity="0.4"/>
      <text x="16" y="20" fill="#cfe8e2">transfer +2.00 · p=0.0008</text>
      <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.1;1" dur="9s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(270,132)" opacity="0">
      <rect width="150" height="30" rx="15" fill="#0e1a2c" stroke="#34e5c4" stroke-opacity="0.4"/>
      <text x="16" y="20" fill="#cfe8e2">MetaForge +21%</text>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.15;0.25;1" dur="9s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(432,132)" opacity="0">
      <rect width="182" height="30" rx="15" fill="#0e1a2c" stroke="#7ad9ff" stroke-opacity="0.4"/>
      <text x="16" y="20" fill="#cfe8e2">open-ended 189 vs 0</text>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.3;0.4;1" dur="9s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
