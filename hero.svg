<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b16"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <radialGradient id="gateGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffcf5a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffcf5a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gated" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#12463f"/>
      <stop offset="1" stop-color="#34e5c4"/>
    </linearGradient>
    <linearGradient id="frozen" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1a2136"/>
      <stop offset="1" stop-color="#4a577a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <!-- grid floor -->
  <g stroke="#16203a" stroke-width="1" opacity="0.7">
    <line x1="0" y1="340" x2="1200" y2="340"/>
    <line x1="0" y1="365" x2="1200" y2="365"/>
    <line x1="0" y1="392" x2="1200" y2="392"/>
    <line x1="250" y1="330" x2="120" y2="420"/>
    <line x1="470" y1="330" x2="430" y2="420"/>
    <line x1="730" y1="330" x2="770" y2="420"/>
    <line x1="950" y1="330" x2="1080" y2="420"/>
  </g>

  <!-- FROZEN tower (right, flat) -->
  <g transform="translate(830,0)">
    <rect x="-45" y="300" width="90" height="40" rx="4" fill="url(#frozen)" opacity="0.9"/>
    <rect x="-45" y="258" width="90" height="40" rx="4" fill="url(#frozen)" opacity="0.85"/>
    <text x="0" y="372" fill="#8ea2c8" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="1">FROZEN</text>
    <text x="0" y="245" fill="#5a6785" font-size="12" text-anchor="middle">admission off · flat control</text>
  </g>

  <!-- GATED tower (left, tall & glowing) -->
  <g transform="translate(300,0)">
    <rect x="-45" y="300" width="90" height="40" rx="4" fill="url(#gated)"/>
    <rect x="-45" y="258" width="90" height="40" rx="4" fill="url(#gated)"/>
    <rect x="-45" y="216" width="90" height="40" rx="4" fill="url(#gated)"/>
    <rect x="-45" y="174" width="90" height="40" rx="4" fill="url(#gated)"/>
    <rect x="-45" y="132" width="90" height="40" rx="4" fill="url(#gated)"/>
    <rect x="-45" y="90"  width="90" height="40" rx="4" fill="url(#gated)"/>
    <text x="0" y="372" fill="#34e5c4" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="1">GATED</text>
    <text x="0" y="78" fill="#8ff0dd" font-size="12" text-anchor="middle">admits self-found blocks · grows</text>
  </g>

  <!-- the gate (center torus) -->
  <g transform="translate(565,205)">
    <ellipse cx="0" cy="0" rx="120" ry="120" fill="url(#gateGlow)"/>
    <ellipse cx="0" cy="0" rx="66" ry="30" fill="none" stroke="#ffcf5a" stroke-width="7" opacity="0.95"/>
    <ellipse cx="0" cy="0" rx="66" ry="30" fill="none" stroke="#fff3cf" stroke-width="2" opacity="0.7"/>
    <text x="0" y="70" fill="#ffcf5a" font-size="12.5" font-weight="600" text-anchor="middle">THE GATE — counterfactual test</text>
    <!-- particles rising -->
    <g fill="#9ff5e4">
      <circle cx="-20" cy="-10" r="2.2" opacity="0.9"/>
      <circle cx="10" cy="-40" r="2" opacity="0.8"/>
      <circle cx="-4" cy="-70" r="1.8" opacity="0.7"/>
      <circle cx="24" cy="-95" r="1.6" opacity="0.55"/>
      <circle cx="-28" cy="-55" r="1.6" opacity="0.6"/>
      <circle cx="0" cy="-120" r="1.4" opacity="0.4"/>
    </g>
  </g>

  <!-- title -->
  <text x="60" y="70" fill="#e8eefc" font-size="38" font-weight="800" letter-spacing="0.5"><tspan fill="#34e5c4">gated</tspan>-selfimprovement</text>
  <text x="62" y="100" fill="#8ea2c8" font-size="15.5">Recursive self-improvement, measured with counterfactual controls. LLM-free · pure-Python · deterministic.</text>

  <!-- result chips -->
  <g font-size="13" font-weight="600">
    <g transform="translate(62,135)">
      <rect x="0" y="0" width="196" height="30" rx="15" fill="#0e1a2c" stroke="#34e5c4" stroke-opacity="0.4"/>
      <text x="16" y="20" fill="#cfe8e2">transfer +2.00 · p=0.0008</text>
    </g>
    <g transform="translate(270,135)">
      <rect x="0" y="0" width="150" height="30" rx="15" fill="#0e1a2c" stroke="#34e5c4" stroke-opacity="0.4"/>
      <text x="16" y="20" fill="#cfe8e2">MetaForge +21%</text>
    </g>
    <g transform="translate(432,135)">
      <rect x="0" y="0" width="182" height="30" rx="15" fill="#0e1a2c" stroke="#7ad9ff" stroke-opacity="0.4"/>
      <text x="16" y="20" fill="#cfe8e2">open-ended 189 vs 0</text>
    </g>
  </g>
</svg>
